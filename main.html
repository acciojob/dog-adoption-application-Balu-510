<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<form style="background-color: gold">
    <label for="name">Name</label>
    <input id="name" type="text" placeholder="Name">
    <br><br>

    <label for="phone">Phone Number</label>
    <input id="phone" type="text" placeholder="Phone Number">
    <br><br>

    <label for="address">Address</label>
    <input id="address" type="text" placeholder="Address">
    <br><br>

    <label for="checkbox">Have you ever lived with a Dog before?</label>
    <input
        id="checkbox"
        type="checkbox"
        value="Have you ever lived with a Dog before?">
    <br><br>

    <label for="multiSelect">Please select your preferred breeds</label>
    <br>

    <select id="multiSelect" multiple>
        <option>Beagle</option>
        <option>Golden Retriever</option>
        <option>Pomeranian</option>
    </select>

    <br><br>

    <input id="submit" type="submit" value="Submit">

</form>

</body>

</html>
